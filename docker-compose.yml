services:
  # --- INFRASTRUCTURE ---

  keycloak:
    image: quay.io/keycloak/keycloak:22.0.5
    container_name: school-keycloak
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/institut_gabriel_rita_db
      KC_DB_USERNAME: ${POSTGRES_USER:-postgres}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    command: start-dev --import-realm
    volumes:
      - ./keycloak-realm.json:/opt/keycloak/data/import/realm.json
    ports:
      - "8081:8080"
    depends_on:
      postgres: { condition: service_healthy }
    networks: [school-network]
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.keycloak.rule=Host(`localhost`) && PathPrefix(`/auth`)"
      - "traefik.http.services.keycloak.loadbalancer.server.port=8080"

  postgres:
    image: postgres:15-alpine
    container_name: institut_gabriel_rita_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: institut_gabriel_rita_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/update_schema.sql:/docker-entrypoint-initdb.d/99-update.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d institut_gabriel_rita_db"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - school-network
    restart: unless-stopped

  # Applique (idempotent) les scripts SQL à chaque lancement
  db-bootstrap:
    image: postgres:15-alpine
    container_name: db-bootstrap
    depends_on:
      postgres: { condition: service_healthy }
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - ./database/update_schema.sql:/scripts/update_schema.sql:ro
    command:
      [
        "sh",
        "-lc",
        "psql -h postgres -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-institut_gabriel_rita_db} -f /scripts/update_schema.sql"
      ]
    networks: [school-network]
    restart: "on-failure"

  rabbitmq:
    image: rabbitmq:3-management
    container_name: infra-rabbitmq
    ports: ["5672:5672", "15672:15672"]
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [school-network]
    restart: unless-stopped

  redis:
    image: redis:alpine
    container_name: school-redis
    ports: ["6379:6379"]
    networks: [school-network]
    restart: unless-stopped

  traefik:
    image: traefik:v2.10
    container_name: infra-traefik
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.web.forwardedHeaders.insecure=true"
    ports: ["0.0.0.0:80:80", "0.0.0.0:8080:8080"]
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks: [school-network]
    restart: unless-stopped

  # --- MICROSERVICES ---
  
  service-dashboard:
    build: ./service-dashboard
    container_name: service-dashboard
    ports: ["3003:3000"]
    environment:
      - DATABASE_HOST=postgres
      - DATABASE_PORT=5432
      - DATABASE_USER=${POSTGRES_USER:-postgres}
      - DATABASE_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - DATABASE_NAME=institut_gabriel_rita_db
      - RABBITMQ_URL=amqp://admin:admin@rabbitmq:5672
      - BIOMETRIC_DEVICE_IP=${BIOMETRIC_DEVICE_IP:-192.168.1.201}
    depends_on:
      postgres: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
      db-bootstrap: { condition: service_completed_successfully }
    networks: [school-network]
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dashboard.rule=Host(`localhost`) && PathPrefix(`/api/dashboard`)"
      - "traefik.http.middlewares.dashboard-strip.stripprefix.prefixes=/api/dashboard"
      - "traefik.http.routers.dashboard.middlewares=dashboard-strip"
      - "traefik.http.services.dashboard.loadbalancer.server.port=3000"

  service-finance:
    build: ./service-finance
    container_name: service-finance
    ports: ["3004:3000"]
    environment:
      - DATABASE_HOST=postgres
      - DATABASE_PORT=5432
      - DATABASE_USER=${POSTGRES_USER:-postgres}
      - DATABASE_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - DATABASE_NAME=institut_gabriel_rita_db
      - RABBITMQ_URL=amqp://admin:admin@rabbitmq:5672
    depends_on:
      postgres: { condition: service_healthy }
      db-bootstrap: { condition: service_completed_successfully }
    networks: [school-network]
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.finance.rule=Host(`localhost`) && PathPrefix(`/api/finance`)"
      - "traefik.http.middlewares.finance-strip.stripprefix.prefixes=/api/finance"
      - "traefik.http.routers.finance.middlewares=finance-strip"
      - "traefik.http.services.finance.loadbalancer.server.port=3000"

  service-reports:
    build: ./report-service
    container_name: service-reports
    ports: ["8000:5000"]
    volumes:
      - ./report-service:/app
    environment:
      - DATABASE_HOST=postgres
      - DATABASE_PORT=5432
      - DATABASE_USER=${POSTGRES_USER:-postgres}
      - DATABASE_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - DATABASE_NAME=institut_gabriel_rita_db
      - FLASK_ENV=production
      - PLANNING_SERVICE_URL=http://service-planning:3000/schedules
    networks: [school-network]
    depends_on:
      - postgres
      - db-bootstrap
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.reports.rule=Host(`localhost`) && PathPrefix(`/api/reports`)"
      - "traefik.http.middlewares.reports-strip.stripprefix.prefixes=/api/reports"
      - "traefik.http.routers.reports.middlewares=reports-strip"
      - "traefik.http.services.reports.loadbalancer.server.port=5000"
    restart: unless-stopped

  service-core-scolarite:
    build: ./service-core-scolarite
    container_name: service-core-scolarite
    ports: ["3000:3000"]
    environment:
      - DATABASE_HOST=postgres
      - DATABASE_PORT=5432
      - DATABASE_USER=${POSTGRES_USER:-postgres}
      - DATABASE_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - DATABASE_NAME=institut_gabriel_rita_db
      - RABBITMQ_URL=amqp://admin:admin@rabbitmq:5672
    depends_on:
      postgres: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
      db-bootstrap: { condition: service_completed_successfully }
    networks: [school-network]
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.core.rule=Host(`localhost`) && PathPrefix(`/api/core`)"
      - "traefik.http.middlewares.core-strip.stripprefix.prefixes=/api/core"
      - "traefik.http.routers.core.middlewares=core-strip"
      - "traefik.http.services.core.loadbalancer.server.port=3000"

  service-planning:
    build: ./service-planning
    container_name: service-planning
    ports: ["3002:3000"]
    environment:
      - DATABASE_HOST=postgres
      - DATABASE_PORT=5432
      - DATABASE_USER=${POSTGRES_USER:-postgres}
      - DATABASE_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - DATABASE_NAME=institut_gabriel_rita_db
      - RABBITMQ_URL=amqp://admin:admin@rabbitmq:5672
    depends_on:
      postgres: { condition: service_healthy }
      db-bootstrap: { condition: service_completed_successfully }
    networks: [school-network]
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.planning.rule=Host(`localhost`) && PathPrefix(`/api/planning`)"
      - "traefik.http.middlewares.planning-strip.stripprefix.prefixes=/api/planning"
      - "traefik.http.routers.planning.middlewares=planning-strip"
      - "traefik.http.services.planning.loadbalancer.server.port=3000"

  
  service-bulletins:
    build: ./service-bulletins
    container_name: service-bulletins
    ports: ["3005:3000"]
    environment:
      - DATABASE_HOST=postgres
      - DATABASE_PORT=5432
      - DATABASE_USER=${POSTGRES_USER:-postgres}
      - DATABASE_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - DATABASE_NAME=institut_gabriel_rita_db
      - RABBITMQ_URL=amqp://admin:admin@rabbitmq:5672
    depends_on:
      postgres: { condition: service_healthy }
      db-bootstrap: { condition: service_completed_successfully }
    networks: [school-network]
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.bulletins.rule=Host(`localhost`) && PathPrefix(`/api/bulletins`)"
      - "traefik.http.middlewares.bulletins-strip.stripprefix.prefixes=/api/bulletins"
      - "traefik.http.routers.bulletins.middlewares=bulletins-strip"
      - "traefik.http.services.bulletins.loadbalancer.server.port=3000"

  # --- FRONTEND ---
  school-frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
        VITE_DISABLE_AUTH: ${VITE_DISABLE_AUTH:-true}
        VITE_DEFAULT_USERNAME: ${VITE_DEFAULT_USERNAME:-admin}
        VITE_DEFAULT_PASSWORD: ${VITE_DEFAULT_PASSWORD:-changeme}
        VITE_DEFAULT_ROLES: ${VITE_DEFAULT_ROLES:-admin,teacher}
    container_name: school-frontend
    expose:
      - "80"
    depends_on:
      - service-dashboard
    networks: [school-network]
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.front.rule=Host(`localhost`) && PathPrefix(`/`)"
      - "traefik.http.routers.front.priority=-1"
      - "traefik.http.services.front.loadbalancer.server.port=80"

  school-waha:
    image: devlikeapro/waha
    container_name: school-waha
    ports: ["3001:3000"]
    networks: [school-network]
    restart: unless-stopped

  typesense:
    image: typesense/typesense:0.25.2
    container_name: school-typesense
    ports: ["8108:8108"]
    command: --data-dir /data --api-key xyz --enable-cors
    volumes: [typesense_data:/data]
    networks: [school-network]
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  typesense_data:

networks:
  school-network:
    driver: bridge
