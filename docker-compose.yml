version: '3.8'

services:
  # --- INFRASTRUCTURE ---
  postgres:
    image: postgres:15-alpine
    container_name: school-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-admin}
      POSTGRES_DB: scolarite_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/update_schema.sql:/docker-entrypoint-initdb.d/99-update.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d scolarite_db"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [school-network]

  rabbitmq:
    image: rabbitmq:3-management
    container_name: infra-rabbitmq
    ports: ["5672:5672", "15672:15672"]
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [school-network]

  redis:
    image: redis:alpine
    container_name: school-redis
    ports: ["6379:6379"]
    networks: [school-network]

  traefik:
    image: traefik:v2.10
    container_name: infra-traefik
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
    ports: ["80:80", "8080:8080"]
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks: [school-network]

  # --- MICROSERVICES ---
  
  service-dashboard:
    build: ./service-dashboard
    container_name: service-dashboard
    ports: ["3003:3000"]
    environment:
      - DATABASE_HOST=postgres
      - RABBITMQ_URL=amqp://admin:admin@rabbitmq:5672
    depends_on:
      postgres: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
    networks: [school-network]
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dashboard.rule=Host(`localhost`) && PathPrefix(`/api/dashboard`)"
      - "traefik.http.services.dashboard.loadbalancer.server.port=3000"

  service-finance:
    build: ./service-finance
    container_name: service-finance
    ports: ["3004:3000"]
    environment:
      - DATABASE_HOST=postgres
      - RABBITMQ_URL=amqp://admin:admin@rabbitmq:5672
    depends_on:
      postgres: { condition: service_healthy }
    networks: [school-network]
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.finance.rule=Host(`localhost`) && PathPrefix(`/api/finance`)"
      - "traefik.http.services.finance.loadbalancer.server.port=3000"

  service-reports:
    build: ./service-reports
    container_name: service-reports
    ports: ["8000:8000"]
    networks: [school-network]
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.reports.rule=Host(`localhost`) && PathPrefix(`/api/reports`)"
      - "traefik.http.services.reports.loadbalancer.server.port=8000"

  service-core-scolarite:
    build: ./service-core-scolarite
    container_name: service-core-scolarite
    ports: ["3000:3000"]
    environment:
      - DATABASE_HOST=postgres
      - RABBITMQ_URL=amqp://admin:admin@rabbitmq:5672
    depends_on:
      postgres: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
    networks: [school-network]
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.core.rule=Host(`localhost`) && PathPrefix(`/api/core`)"
      - "traefik.http.services.core.loadbalancer.server.port=3000"

  service-planning:
    build: ./service-planning
    container_name: service-planning
    ports: ["3002:3000"]
    environment:
      - DATABASE_HOST=postgres
      - RABBITMQ_URL=amqp://admin:admin@rabbitmq:5672
    depends_on:
      postgres: { condition: service_healthy }
    networks: [school-network]
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.planning.rule=Host(`localhost`) && PathPrefix(`/api/planning`)"
      - "traefik.http.services.planning.loadbalancer.server.port=3000"

  # --- FRONTEND ---
  school-frontend:
    build: ./frontend
    container_name: school-frontend
    ports: ["5173:80"]
    depends_on:
      - service-dashboard
    networks: [school-network]
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.front.rule=Host(`localhost`)"
      - "traefik.http.services.front.loadbalancer.server.port=80"

  school-waha:
    image: devlikeapro/waha
    container_name: school-waha
    ports: ["3001:3000"]
    networks: [school-network]

  typesense:
    image: typesense/typesense:0.25.2
    container_name: school-typesense
    ports: ["8108:8108"]
    command: --data-dir /data --api-key xyz --enable-cors
    volumes: [typesense_data:/data]
    networks: [school-network]

volumes:
  postgres_data:
  redis_data:
  typesense_data:

networks:
  school-network:
    driver: bridge
