<svg width="100" height="100" xmlns="http://www.w3.org/2000/svg">
  <!-- Cercle extérieur -->
  <circle cx="50" cy="50" r="45" stroke="#004085" stroke-width="3" fill="white" />
  
  <!-- Livres stylisés -->
  <rect x="35" y="30" width="30" height="40" fill="#004085" rx="3" />
  <rect x="40" y="25" width="20" height="50" fill="none" stroke="#004085" stroke-width="2" rx="3" />
  
  <!-- Lettres GR pour Gabriel Rita -->
  <text x="50" y="55" font-family="Arial, sans-serif" font-size="20" fill="#004085" text-anchor="middle" dominant-baseline="middle">GR</text>
  
  <!-- Couronne académique stylisée -->
  <path d="M20,40 Q50,20 80,40" stroke="#004085" stroke-width="2" fill="none" />
</svg>